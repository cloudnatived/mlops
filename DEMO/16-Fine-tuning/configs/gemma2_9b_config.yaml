# ============================================
# Gemma-2-9B 模型配置文件
# 适用于: google/gemma-2-9b
# 硬件: 2x V100-PCIE-16GB
# ============================================

model:
  name: "google/gemma-2-9b"
  type: "causal_lm"
  torch_dtype: "float16"
  trust_remote_code: true
  use_cache: false

tokenizer:
  add_eos_token: true
  padding_side: "right"
  max_length: 512

# ============================================
# LoRA 配置 (主要使用，因为9B全量微调显存紧张)
# ============================================
lora:
  enabled: true
  output_dir: "./outputs/gemma2_9b/lora"
  
  lora_config:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    bias: "none"
    task_type: "CAUSAL_LM"
    target_modules: 
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
  
  training:
    num_train_epochs: 3
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 16
    learning_rate: 2.0e-4
    weight_decay: 0.01
    warmup_ratio: 0.1
    lr_scheduler_type: "cosine"
    optim: "paged_adamw_8bit"
    fp16: true
    gradient_checkpointing: true  # 9B模型需要
    logging_steps: 10
    save_steps: 100
    save_total_limit: 2

# ============================================
# QLoRA 配置 (推荐用于9B)
# ============================================
qlora:
  enabled: true
  output_dir: "./outputs/gemma2_9b/qlora"
  
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_use_double_quant: true
  
  lora_config:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    bias: "none"
    task_type: "CAUSAL_LM"
    target_modules: 
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
  
  training:
    num_train_epochs: 3
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 8
    learning_rate: 2.0e-4
    weight_decay: 0.01
    warmup_ratio: 0.1
    lr_scheduler_type: "cosine"
    optim: "paged_adamw_8bit"
    fp16: true
    gradient_checkpointing: true
    logging_steps: 10
    save_steps: 100
    save_total_limit: 2
