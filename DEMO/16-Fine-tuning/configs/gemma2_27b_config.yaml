# ============================================
# Gemma-2-27B 模型配置文件
# 适用于: google/gemma-2-27b
# 硬件: 2x V100-PCIE-16GB (需要QLoRA + CPU Offload)
# ============================================

model:
  name: "google/gemma-2-27b"
  type: "causal_lm"
  torch_dtype: "float16"
  trust_remote_code: true
  use_cache: false

tokenizer:
  add_eos_token: true
  padding_side: "right"
  max_length: 512

# ============================================
# QLoRA 配置 (27B只能用QLoRA)
# ============================================
qlora:
  enabled: true
  output_dir: "./outputs/gemma2_27b/qlora"
  
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_use_double_quant: true
  
  lora_config:
    r: 32  # 大模型可以用更大的rank
    lora_alpha: 64
    lora_dropout: 0.05
    bias: "none"
    task_type: "CAUSAL_LM"
    target_modules: 
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
  
  training:
    num_train_epochs: 2
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 32
    learning_rate: 2.0e-4
    weight_decay: 0.01
    warmup_ratio: 0.1
    lr_scheduler_type: "cosine"
    optim: "paged_adamw_8bit"
    fp16: true
    gradient_checkpointing: true
    # CPU Offload配置
    optim_args: "offload_optimizer=True"  # 将优化器offload到CPU
    logging_steps: 10
    save_steps: 100
    save_total_limit: 1  # 节省磁盘空间
    
  # 显存估算（需要双卡+CPU Offload）
  memory_estimate:
    model_size: "~3.5GB (4-bit)"
    optimizer: "~1.0GB (CPU)"
    gradients: "~0.8GB"
    activations: "~3-4GB"
    total: "~8-10GB per GPU"
